name = "onest-creative-id"
main = "src/index.js"
compatibility_date = "2026-06-18"

# Keep the workers.dev URL alive — the generator calls it for /next, /peek and
# /create-task. Adding routes would otherwise disable it.
workers_dev = true

# Serve the generator on its own subdomain. A path on onestos.org gets shadowed by
# that app's PWA service worker (it serves the cached app shell for any same-origin
# navigation, so the team sees the SPA's 404). A separate subdomain is a different
# origin the service worker can't intercept. custom_domain = true makes Cloudflare
# create the DNS record + cert + route automatically.
routes = [
  { pattern = "generator.onestos.org", custom_domain = true }
]

# Atomic creative-ID counter for the ONEST Filename Generator.
# GET /next  -> claims the next ID (atomic increment), returns { "id": 59 }
# GET /peek  -> { "current": 58, "next": 59 } without incrementing
# D1 serialises writes per database, so two editors never get the same number.

[[d1_databases]]
binding = "DB"
database_name = "onest-creative-ids"
database_id = "7522e4c2-9dd0-4b0d-8be1-5b690cbbc9cb"
